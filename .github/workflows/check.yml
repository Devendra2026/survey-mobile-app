name: Check

on:
  push:
    branches: ['main']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Sync Convex API from monorepo sibling
        run: npm run ensure:convex-api
      - run: npm run check
